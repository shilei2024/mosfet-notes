baseURL = "https://mosfet-notes.netlify.app/"
title = "MOSFET实战笔记"
locale = "zh-cn"
hasCJKLanguage = true
enableRobotsTXT = true
paginate = 10

ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      passthrough = { enable = true }
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = false
    style = "github"
    tabWidth = 4

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[services.rss]
  limit = 50

[params]
  description = "聚焦功率器件、电源与电机驱动的实战笔记与项目记录"
  author = "Lance"
  mainSections = ["post"]
  showReadingTime = true
  showTOC = true
  fontFamily = "serif"

  # Twikoo 评论系统（默认关闭）
  [params.twikoo]
    enabled = false
    envId = "https://twikoo-PLACEHOLDER.vercel.app"
    region = ""
    lang = "zh-CN"

  # Umami 访问统计（默认关闭）
  [params.umami]
    enabled = false
    websiteId = "PLACEHOLDER"
    src = "https://cloud.umami.is/script.js"
    domains = []

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "文章"
    url = "/post/"
    weight = 2
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 3
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 4