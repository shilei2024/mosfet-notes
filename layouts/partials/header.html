{{/*
  partials/header.html — 顶部导航 + 暗色切换按钮
*/}}
<header class="site-header">
  <div class="container">
    <a class="site-title" href="{{ .Site.BaseURL }}" rel="home">{{ .Site.Title }}</a>
    <nav class="site-nav" aria-label="主导航">
      {{- range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if eq .URL $.RelPermalink }} class="active"{{ end }}>{{ .Name }}</a>
      {{- end }}
      {{- partial "theme-toggle.html" . }}
    </nav>
  </div>
</header>
